<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antygravity Board - Ciekawostki i Numer</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --accent: #ff0055; --bg: #050510; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Montserrat', sans-serif; color: #fff; }
        
        .blob { position: fixed; width: 50vw; height: 50vw; background: var(--secondary); filter: blur(150px); opacity: 0.2; border-radius: 50%; z-index: -1; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(60%, 40%); } }

        #main { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .view { position: absolute; width: 100%; height: 100%; padding: 40px; box-sizing: border-box; display: flex; gap: 40px; opacity: 0; transform: scale(0.9) translateY(20px); transition: all 1s ease; pointer-events: none; }
        .view.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: all; z-index: 10; }

        .card { flex: 1; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        #clock { text-align: center; }
        #time { font-size: 8em; font-weight: 900; text-shadow: 0 0 30px var(--primary); }
        #date { font-size: 2.5em; font-weight: 700; margin-top: 10px; }

        #lucky { border: 2px solid var(--primary); }
        #num { font-family: 'Bangers', cursive; font-size: 15em; color: #fff; text-shadow: 0 0 50px var(--primary); line-height: 1; }
        .title { font-family: 'Bangers', cursive; font-size: 3em; color: var(--primary); }

        #history-card { flex-direction: row; padding: 60px; text-align: left; }
        #fact-img { width: 40%; height: 80%; border-radius: 20px; object-fit: cover; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        #fact-content { flex: 1; padding-left: 50px; }
        #fact-year { font-family: 'Bangers', cursive; font-size: 4em; color: var(--accent); margin-bottom: 20px; }
        #fact-text { font-size: 2.5em; line-height: 1.3; font-weight: 300; }

        #progress { position: fixed; bottom: 0; left: 0; height: 6px; background: var(--primary); width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div id="progress"></div>

    <div id="main">
        <!-- WIDOK A: Zegar i Numer -->
        <div id="view-a" class="view active">
            <div class="card">
                <div id="clock">
                    <div id="time">00:00:00</div>
                    <div id="date">Ładowanie...</div>
                </div>
            </div>
            <div class="card" id="lucky">
                <div class="title">SZCZĘŚLIWY NUMER</div>
                <div id="num">?</div>
            </div>
        </div>

        <!-- WIDOK B: Historia -->
        <div id="view-b" class="view">
            <div class="card" id="history-card">
                <img id="fact-img" src="" alt="">
                <div id="fact-content">
                    <div id="fact-year">ROK ...</div>
                    <div id="fact-text">Pobieranie ciekawostek z historii wszechświata...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DURATION = 15000; 
        let events = [], eventIdx = 0, timer = Date.now();

        function update() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('pl-PL');
            document.getElementById('date').innerText = now.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long' });
            
            const p = ((Date.now() - timer) / DURATION) * 100;
            document.getElementById('progress').style.width = p + '%';
            if (p >= 100) switchView();
        }

        async function load() {
            const now = new Date();
            const d = `${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
            try {
                const r = await fetch(`/api/events?date=${d}`);
                events = await r.json();
            } catch (e) { console.error(e); }
        }

        function switchView() {
            timer = Date.now();
            const va = document.getElementById('view-a'), vb = document.getElementById('view-b');
            if (va.classList.contains('active')) {
                if (events.length > 0) {
                    const ev = events[eventIdx];
                    document.getElementById('fact-year').innerText = ev.y + ' ROK';
                    document.getElementById('fact-text').innerText = ev.t || ev.description;
                    document.getElementById('fact-img').src = ev.img || ev.image_url || '';
                    document.getElementById('fact-img').style.display = (ev.img || ev.image_url) ? 'block' : 'none';
                    eventIdx = (eventIdx + 1) % events.length;
                }
                va.classList.remove('active'); vb.classList.add('active');
            } else {
                va.classList.add('active'); vb.classList.remove('active');
                load(); // Odśwież dane w tle
                updateLucky();
            }
        }

        function updateLucky() {
            const now = new Date();
            const start = new Date('2025-10-25');
            const diff = Math.floor((now - start) / 86400000);
            const bags = [[3,5,17,1,9,14,6,8,12,4,10,15,2,13,7,11,18,16],[10,4,15,2,13,7,1,18,9,16,5,11,17,3,8,14,6,12]];
            const num = bags[Math.floor((diff % 36) / 18)][diff % 18];
            document.getElementById('num').innerText = num || '?';
        }

        setInterval(update, 100);
        load(); updateLucky();
    </script>
</body>
</html>
