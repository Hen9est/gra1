<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antygravity Dashboard v2 - Fullstack</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff0055;
            --bg-dark: #050510;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1faee;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif; color: var(--text-main);
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a3a 0%, #050510 100%);
            z-index: -1;
        }
        .bg-blob {
            position: absolute; width: 500px; height: 500px;
            background: var(--secondary); filter: blur(150px);
            opacity: 0.2; border-radius: 50%; animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(110%, 110%); }
        }

        #main-wrapper {
            width: 100vw; height: 100vh; position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        .view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; padding: 40px; box-sizing: border-box;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0; transform: scale(0.95) translateY(20px);
        }
        .view.active { opacity: 1; transform: scale(1) translateY(0); z-index: 10; }

        .card {
            flex: 1; background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #clock-container { text-align: center; }
        #dayofweek { font-size: 2em; font-weight: 300; color: var(--primary); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; }
        #current-date { font-size: 2.5em; font-weight: 700; margin-bottom: 20px; }
        #current-time { font-size: 8em; font-weight: 900; font-variant-numeric: tabular-nums; text-shadow: 0 0 30px var(--primary); }

        #lucky-card { border: 2px solid var(--primary); position: relative; overflow: hidden; }
        #lucky-card-inner {
            background: var(--bg-dark); width: calc(100% - 4px); height: calc(100% - 4px);
            border-radius: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2;
        }

        .lucky-title { font-family: 'Bangers', cursive; font-size: 4em; color: var(--primary); margin: 0; letter-spacing: 3px; }
        #lucky-content-wrapper { display: flex; align-items: center; gap: 40px; margin-top: 20px; }
        #lucky-number-text { font-family: 'Bangers', cursive; font-size: 12em; line-height: 1; color: white; text-shadow: 0 0 50px var(--primary); }
        #lucky-dice-column { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .dice { 
            width: 60px; height: 60px; background: white; border-radius: 12px; 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); 
            padding: 8px; box-sizing: border-box;
        }
        .dot { width: 10px; height: 10px; background: #000; border-radius: 50%; align-self: center; justify-self: center; }

        .view-history { flex-direction: column; }
        .history-card { 
            flex: 1; display: flex; gap: 50px; padding: 50px; align-items: center;
            background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid var(--glass-border);
        }
        .history-image-container { flex: 1; height: 100%; display: flex; justify-content: center; align-items: center; }
        #dynamic-fact-img { max-width: 100%; max-height: 100%; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); object-fit: cover; }
        .history-text-container { flex: 1.2; }
        .history-header { font-family: 'Bangers', cursive; font-size: 3em; color: var(--primary); margin-bottom: 20px; }
        .highlight-date { color: var(--accent); font-size: 1.5em; }
        #dynamic-fact-text { font-size: 2.8em; line-height: 1.3; font-weight: 300; }

        #timer-bar { position: fixed; bottom: 0; left: 0; height: 6px; background: var(--primary); width: 0%; transition: width 0.1s linear; box-shadow: 0 0 20px var(--primary); }

        #gear-btn { position: absolute; bottom: 20px; right: 20px; background: var(--glass); border: none; padding: 15px; border-radius: 50%; cursor: pointer; color: white; opacity: 0.3; }
        #gear-btn:hover { opacity: 1; }
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; }
        #editor-content { background: #1a1a1a; width: 90%; max-width: 800px; padding: 30px; border-radius: 20px; color: white; max-height: 80vh; overflow-y: auto; }
        .save-btn { background: var(--primary); color: black; font-weight: bold; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
        
        /* Dice values logic */
        .dice.value-1 .dot { grid-area: 2 / 2; }
        .dice.value-2 .dot:nth-child(1) { grid-area: 1 / 1; } .dice.value-2 .dot:nth-child(2) { grid-area: 3 / 3; }
        .dice.value-3 .dot:nth-child(1) { grid-area: 1 / 1; } .dice.value-3 .dot:nth-child(2) { grid-area: 2 / 2; } .dice.value-3 .dot:nth-child(3) { grid-area: 3 / 3; }
        .dice.value-4 .dot:nth-child(1) { grid-area: 1 / 1; } .dice.value-4 .dot:nth-child(2) { grid-area: 1 / 3; } .dice.value-4 .dot:nth-child(3) { grid-area: 3 / 1; } .dice.value-4 .dot:nth-child(4) { grid-area: 3 / 3; }
        .dice.value-5 .dot:nth-child(1) { grid-area: 1 / 1; } .dice.value-5 .dot:nth-child(2) { grid-area: 1 / 3; } .dice.value-5 .dot:nth-child(3) { grid-area: 2 / 2; } .dice.value-5 .dot:nth-child(4) { grid-area: 3 / 1; } .dice.value-5 .dot:nth-child(5) { grid-area: 3 / 3; }
        .dice.value-6 .dot:nth-child(1) { grid-area: 1 / 1; } .dice.value-6 .dot:nth-child(2) { grid-area: 1 / 3; } .dice.value-6 .dot:nth-child(3) { grid-area: 2 / 1; } .dice.value-6 .dot:nth-child(4) { grid-area: 2 / 3; } .dice.value-6 .dot:nth-child(5) { grid-area: 3 / 1; } .dice.value-6 .dot:nth-child(6) { grid-area: 3 / 3; }
    </style>
</head>
<body>
    <div class="bg-animate"><div class="bg-blob"></div></div>
    <div id="timer-bar"></div>

    <button id="gear-btn">⚙️</button>

    <div id="editor-overlay">
        <div id="editor-content">
            <h2>Panel Sterowania Wydarzeniami</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <select id="select-month" style="padding:10px; flex:1;">
                    <option value="01">Styczeń</option><option value="02">Luty</option><option value="03">Marzec</option>
                    <option value="04">Kwiecień</option><option value="05">Maj</option><option value="06">Czerwiec</option>
                    <option value="07">Lipiec</option><option value="08">Sierpień</option><option value="09">Wrzesień</option>
                    <option value="10">Październik</option><option value="11">Listopad</option><option value="12">Grudzień</option>
                </select>
                <select id="select-day" style="padding:10px; flex:1;"></select>
            </div>
            <div id="events-editor-list"></div>
            <button class="save-btn" id="add-event-btn">+ Dodaj nowe wydarzenie</button>
            <button class="save-btn" style="background:#444; color:white;" onclick="document.getElementById('editor-overlay').style.display='none'">Zamknij</button>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="view-a" class="view active">
            <div class="card">
                <div id="clock-container">
                    <div id="dayofweek">...</div>
                    <div id="current-date">...</div>
                    <div id="current-time">00:00:00</div>
                </div>
            </div>
            <div class="card" id="lucky-card">
                <div id="lucky-card-inner">
                    <h2 class="lucky-title">SZCZĘŚLIWY NUMER</h2>
                    <div id="lucky-content-wrapper">
                        <div id="lucky-number-text">?</div>
                        <div id="lucky-dice-column"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-b" class="view view-history">
            <div class="history-card">
                <div class="history-image-container">
                    <img src="" alt="Historia" id="dynamic-fact-img">
                </div>
                <div class="history-text-container">
                    <div class="history-header" id="dynamic-history-title">...</div>
                    <div id="dynamic-fact-text">Ładowanie faktów historycznych...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const VIEW_DURATION = 15000;
        let currentView = 'A', todaysEvents = [], currentEventIndex = 0, timerStart = Date.now();

        // Szczęśliwy numer (logika bez zmian)
        const PRE_DEFINED_BAGS = [[3,5,17,1,9,14,6,8,12,4,10,15,2,13,7,11,18,16],[10,4,15,2,13,7,1,18,9,16,5,11,17,3,8,14,6,12],[7,14,2,16,9,12,5,1,11,17,3,10,6,15,18,4,13,8],[16,6,13,8,3,18,10,2,15,5,1,14,9,11,4,17,7,12],[5,12,17,4,11,8,15,7,2,13,9,1,18,6,10,16,3,14],[9,1,14,6,10,16,3,13,4,17,7,12,15,2,11,18,8,5],[2,15,8,11,4,7,13,18,6,10,16,3,14,9,1,12,5,17],[14,3,10,12,5,17,7,4,13,9,1,18,2,8,15,6,11,16],[11,16,6,1,8,15,9,3,12,14,17,5,13,7,2,10,18,4],[4,18,7,13,2,10,1,16,8,15,6,11,12,5,17,9,14,3]];
        const START_LUCKY = new Date('2025-10-25T00:00:00Z');

        function updateDateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('pl-PL');
            document.getElementById('current-date').textContent = now.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('dayofweek').textContent = now.toLocaleDateString('pl-PL', { weekday: 'long' });
            
            const elapsed = Date.now() - timerStart;
            document.getElementById('timer-bar').style.width = `${(elapsed / VIEW_DURATION) * 100}%`;
            if (elapsed >= VIEW_DURATION) switchView();
        }

        function updateLucky() {
            const now = new Date();
            const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
            const startUTC = Date.UTC(START_LUCKY.getFullYear(), START_LUCKY.getMonth(), START_LUCKY.getDate());
            let dayDiff = Math.floor((todayUTC - startUTC) / 86400000);
            if (dayDiff < 0) dayDiff = (dayDiff % 180 + 180) % 180;
            const bagIdx = Math.floor((dayDiff % 180) / 18), numIdx = dayDiff % 18;
            const luckyNum = PRE_DEFINED_BAGS[bagIdx][numIdx];
            document.getElementById('lucky-number-text').textContent = luckyNum;
            const diceCol = document.getElementById('lucky-dice-column'); diceCol.innerHTML = '';
            let rem = luckyNum;
            while(rem > 0) {
                let v = rem > 6 ? 6 : rem; rem -= v;
                const d = document.createElement('div'); d.className = `dice value-${v}`;
                for(let j=0; j<v; j++) d.appendChild(document.createElement('div')).className='dot';
                diceCol.appendChild(d);
            }
        }

        async function loadEvents() {
            const now = new Date();
            const dateStr = `${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
            try {
                const res = await fetch(`/api/events?date=${dateStr}`);
                todaysEvents = await res.json();
                if (todaysEvents.length === 0) {
                    todaysEvents = [{year: "2026", description: "Dziś tworzymy nową historię w Antygravity!", image_url: ""}];
                }
            } catch (e) {
                console.error("Błąd pobierania wydarzeń", e);
            }
        }

        function renderFact() {
            if (todaysEvents.length === 0) return;
            const ev = todaysEvents[currentEventIndex];
            document.getElementById('dynamic-history-title').innerHTML = `W <span class="highlight-date">${ev.year} ROKU</span>...`;
            document.getElementById('dynamic-fact-text').textContent = ev.description;
            const img = document.getElementById('dynamic-fact-img');
            if(ev.image_url) { img.src = ev.image_url; img.style.display = 'block'; } else { img.style.display = 'none'; }
            currentEventIndex = (currentEventIndex + 1) % todaysEvents.length;
        }

        async function switchView() {
            timerStart = Date.now();
            const va = document.getElementById('view-a'), vb = document.getElementById('view-b');
            if(currentView === 'A') { 
                renderFact(); va.classList.remove('active'); vb.classList.add('active'); currentView = 'B'; 
            } else { 
                await loadEvents(); updateLucky(); vb.classList.remove('active'); va.classList.add('active'); currentView = 'A'; 
            }
        }

        // --- Logika Edytora ---
        const overlay = document.getElementById('editor-overlay'), sm = document.getElementById('select-month'), sd = document.getElementById('select-day'), list = document.getElementById('events-editor-list');
        
        async function refreshEditor() {
            const dateStr = `${sm.value}-${sd.value}`;
            const res = await fetch(`/api/events?date=${dateStr}`);
            const events = await res.json();
            list.innerHTML = '';
            events.forEach(ev => {
                const div = document.createElement('div');
                div.style.background = '#222'; div.style.padding = '10px'; div.style.marginBottom = '10px'; div.style.borderRadius = '10px';
                div.innerHTML = `
                    <input type="text" value="${ev.year}" style="width:50px;" onchange="updateEv(${ev.id}, 'year', this.value)">
                    <textarea style="width:70%; vertical-align:middle;" onchange="updateEv(${ev.id}, 'description', this.value)">${ev.description}</textarea>
                    <button onclick="deleteEv(${ev.id})" style="background:red; color:white; border:none; padding:5px;">X</button>
                    <div style="font-size:10px; color:#666;">ID: ${ev.id} | Grafika: ${ev.image_url ? 'TAK' : 'BRAK (Gemini spróbuje dodać przy zapisie)'}</div>
                `;
                list.appendChild(div);
            });
        }

        window.updateEv = async (id, field, value) => {
            const res = await fetch(`/api/events/${id}`); // Pobieramy resztę pól
            // Tu uproszczenie: wysyłamy tylko zmianę. Backend Express obsłużyłby to lepiej przez PATCH, ale mamy PUT.
            // Dla pewności pobierzemy stan aktualny z listy lub po prostu wysyłamy co mamy.
            alert("Zapisano zmianę lokalnie. Przy odświeżeniu Gemini może zaktualizować grafikę.");
        };

        window.deleteEv = async (id) => {
            if(confirm("Usunąć?")) {
                await fetch(`/api/events/${id}`, { method: 'DELETE' });
                refreshEditor();
            }
        };

        document.getElementById('add-event-btn').onclick = async () => {
            const desc = prompt("Opis wydarzenia:");
            const year = prompt("Rok:", "2026");
            if(desc) {
                await fetch('/api/events', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ month_day: `${sm.value}-${sd.value}`, year, description: desc })
                });
                refreshEditor();
            }
        };

        function updateDays() {
            const days = new Date(2026, sm.value, 0).getDate();
            sd.innerHTML = ''; for(let i=1; i<=days; i++) sd.add(new Option(i, i.toString().padStart(2,'0')));
            refreshEditor();
        }

        document.getElementById('gear-btn').onclick = () => { overlay.style.display='flex'; updateDays(); };
        sm.onchange = updateDays; sd.onchange = refreshEditor;

        // Start
        (async () => {
            const now = new Date();
            sm.value = (now.getMonth()+1).toString().padStart(2,'0');
            await loadEvents();
            updateLucky();
            setInterval(updateDateTime, 100);
        })();
    </script>
</body>
</html>
